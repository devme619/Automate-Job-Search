<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Test Application</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        max-width: 720px;
      }
      label {
        display: grid;
        gap: 6px;
        margin: 12px 0;
      }
      input,
      textarea {
        padding: 10px;
      }
      button {
        margin-top: 14px;
        padding: 10px 16px;
      }
    </style>
  </head>
  <body>
    <h1>Frontend Engineer</h1>
    <button id="apply" onclick="document.querySelector('form').hidden = false">Apply Now</button>
    <form hidden onsubmit="event.preventDefault(); document.body.dataset.submitted = 'true';">
      <label>Full name <input name="full_name" /></label>
      <label>Email <input name="email" /></label>
      <label>Phone <input name="phone" /></label>
      <label>Location <input name="location" /></label>
      <label>Resume <input name="resume" type="file" /></label>
      <label>Cover Letter <input name="cover_letter" type="file" /></label>
      <label>Years of experience <input name="years_experience" /></label>
      <label>Salary expectation <input name="salary_expectation" /></label>
      <label>Why are you interested <textarea name="why"></textarea></label>
      <button type="button">Next</button>
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
